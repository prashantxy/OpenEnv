name: rl-incident-management
description: RL environment for real-world incident mitigation (CPU, latency, errors)

server:
  url: http://127.0.0.1:8000

environment:
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state

tasks:
  - id: easy
    description: Keep CPU under control
  - id: medium
    description: Reduce errors and latency
  - id: hard
    description: Fully stabilize system

evaluation:
  metrics:
    - score